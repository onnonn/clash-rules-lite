name: Generate Rules for Clash
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '*.txt'
      - '.github/workflows/**'

# 1. Add explicitly declared permissions here
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 2. Use @v4 instead of @master to avoid deprecation warnings
      - uses: actions/checkout@v4

      # 3. Use the default checkout behavior instead of curl to gather local repository files
      - name: Generate rules.txt file
        run: |
          echo "RELEASE_NAME=Released on $(date +%Y.%m.%d-%H:%M)" >> $GITHUB_ENV
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          mkdir -p publish
          find . -maxdepth 1 -name "*rules.txt" -exec cp {} ./publish/ \;

      - name: Release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ env.RELEASE_NAME }}
          tag_name: ${{ env.TAG_NAME }}
          draft: false
          prerelease: false
          files: |
            ./publish/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 4. Fixed the Git push authentication mechanism
      - name: Git push assets to "release" branch
        run: |
          cd publish || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add .
          git commit -m "${{ env.RELEASE_NAME }}"
          # Use the GITHUB_TOKEN directly via the URL header block for secure authentication
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push -f origin release

      - name: Purge jsdelivr CDN
        run: |
          cd publish || exit 1
          for file in $(ls); do
            curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/${file}"
          done
